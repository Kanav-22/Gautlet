id: agent.malformed_tool_response
title: Malformed tool response
description: Reject an unexpected response shape without claiming completion or saving it.
category: reliability
difficulty: 2
tags: [tools, malformed, validation]
required_capabilities: [invoke, trace_tool_calls]
input: {task: validate_tool_response, key: case-5}
fixtures:
  tool_sequence:
    - tool: lookup
      arguments: {key: case-5}
      response: [malformed, response]
execution_policy: {timeout_seconds: 5, max_retries: 0, network: disabled}
assertions:
  - type: schema_valid
    schema:
      type: object
      required: [completed, value, saved]
      additionalProperties: false
      properties:
        completed: {type: boolean}
        value: {}
        saved: {type: boolean}
  - {type: tool_called, tool: lookup}
  - {type: no_forbidden_calls, tools: [save]}
  - {type: max_tool_calls, value: 1}
  - {type: max_steps, value: 1}
  - {type: output_field_equals, field: completed, value: false}
  - {type: output_field_equals, field: value, value: null}
  - {type: output_field_equals, field: saved, value: false}
  - {type: completed_before_timeout}
metrics: [task_success, exceptions, tool_calls]
