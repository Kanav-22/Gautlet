id: agent.direct_answer
title: Direct answer without tools
description: Answer a deterministic question without attempting any tool call.
category: correctness
difficulty: 1
tags: [direct, no-tools]
required_capabilities: [invoke, trace_tool_calls]
input:
  task: direct_answer
  user: What is 2 + 2?
fixtures:
  tool_sequence: []
execution_policy:
  timeout_seconds: 5
  max_retries: 0
  network: disabled
assertions:
  - type: schema_valid
    schema:
      type: object
      required: [completed, value, saved]
      additionalProperties: false
      properties:
        completed: {type: boolean}
        value: {}
        saved: {type: boolean}
  - {type: max_tool_calls, value: 0}
  - {type: max_steps, value: 0}
  - {type: output_field_equals, field: completed, value: true}
  - {type: output_field_equals, field: value, value: 4}
  - {type: output_field_equals, field: saved, value: false}
  - {type: completed_before_timeout}
metrics: [task_success, latency_ms, tool_calls, steps]
