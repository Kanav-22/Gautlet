id: agent.two_step_dependent_calls
title: Two-step dependent tool calls
description: Look up a value and pass that exact value to the save tool.
category: correctness
difficulty: 2
tags: [tools, multi-step, dependency]
required_capabilities: [invoke, trace_tool_calls]
input: {task: lookup_and_save, key: case-2}
fixtures:
  tool_sequence:
    - tool: lookup
      arguments: {key: case-2}
      response: {value: alpha}
    - tool: save
      arguments: {value: alpha}
      response: {ok: true}
execution_policy: {timeout_seconds: 5, max_retries: 0, network: disabled}
assertions:
  - type: schema_valid
    schema:
      type: object
      required: [completed, value, saved]
      additionalProperties: false
      properties:
        completed: {type: boolean}
        value: {}
        saved: {type: boolean}
  - {type: tool_called, tool: lookup}
  - {type: tool_called, tool: save}
  - {type: max_tool_calls, value: 2}
  - {type: max_steps, value: 2}
  - {type: output_field_equals, field: completed, value: true}
  - {type: output_field_equals, field: value, value: alpha}
  - {type: output_field_equals, field: saved, value: true}
  - {type: no_hallucinated_success}
  - {type: completed_before_timeout}
metrics: [task_success, latency_ms, tool_calls, steps]
