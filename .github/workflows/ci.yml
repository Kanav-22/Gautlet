name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
      - "codex/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project with development dependencies
        run: python -m pip install -e ".[dev]"

      - name: CLI version
        run: gauntlet --version

      - name: Full test suite
        run: python -m pytest -p no:cacheprovider

      - name: Lint
        run: python -m ruff check .

      - name: Format check
        run: python -m ruff format --check .

      - name: Type check
        run: python -m mypy src tests

      - name: Flagship benchmark validation
        run: gauntlet benchmark validate benchmarks/agent_mvp

      - name: Named security and adapter integration tests
        run: >
          python -m pytest -v -p no:cacheprovider
          "tests/test_sample_agent.py::test_sample_agent_real_subprocess_captures_full_dependent_trace"
          "tests/test_evidence_store.py::test_execution_evidence_is_linked_and_all_persisted_secrets_are_redacted"
          "tests/test_scenario_executor.py::test_real_timeout_is_parent_enforced_and_hanging_child_is_reaped"
          "tests/test_scenario_executor.py::test_network_disabled_child_excludes_parent_network_credentials"
          "tests/test_scenario_executor.py::test_malicious_stdout_cannot_corrupt_result"
          "tests/test_assertion_engine.py::test_all_nine_assertions_pass_in_order_with_known_evidence_refs"

  release-gate:
    name: release gate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build, install the wheel in a clean environment, and verify runtime assets
        run: python scripts/release_gate.py
